name: Publish to PyPI

# Publishes to PyPI via Trusted Publishing (OIDC) — no API token is ever stored.
# Fires when a GitHub Release is published (tag a release, e.g. v0.1.0), or run
# manually. One-time setup on PyPI is required first: register a "pending
# publisher" for project `llmstxt-generator` pointing at this repo, the
# `publish.yml` workflow, and the `pypi` environment (see README/CONTRIBUTING).

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Validate metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # The `pypi` environment is the trusted-publisher target configured on PyPI.
    environment:
      name: pypi
      url: https://pypi.org/p/llmstxt-generator
    permissions:
      id-token: write   # required for OIDC Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
